<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liste de courses - Firebase</title>
    <link rel="icon" type="image/png" href="shop.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <h1>🛒 Liste de courses</h1>
          <p>Version GitHub Pages + Firebase</p>
        </div>
        <div class="auth-actions">
          <p id="user-info" class="user-info">Non connecté</p>
          <button id="login-btn" class="btn btn-primary" type="button">Se connecter avec Google</button>
          <button id="logout-btn" class="btn btn-ghost" type="button" hidden>Se déconnecter</button>
        </div>
      </header>

      <section class="card form-card" aria-label="Ajouter un article">
        <form id="add-form" class="add-form">
          <label>
            <span>Produit</span>
            <input id="product" type="text" placeholder="Ex: Lait" required maxlength="80" />
          </label>

          <label>
            <span>Quantité</span>
            <input id="quantity" type="text" placeholder="Ex: 2" maxlength="30" />
          </label>

          <button type="submit" class="btn btn-primary">Ajouter</button>
        </form>
      </section>

      <section class="card list-card" aria-label="Articles">
        <div class="list-toolbar">
          <h2>Ma liste</h2>
          <button id="clear-btn" class="btn btn-danger" type="button">Vider les achetés</button>
        </div>
        <p id="status" class="status">Connectez-vous pour charger la liste.</p>
        <ul id="list" class="shopping-list"></ul>
      </section>
    </main>

    <script src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
