<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liste de courses - Firebase</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>🛒 Liste de courses</h1>
        <p>Version GitHub Pages + Firebase</p>
      </header>

      <section class="card form-card" aria-label="Ajouter un article">
        <form id="add-form" class="add-form">
          <label>
            <span>Produit</span>
            <input id="product" type="text" placeholder="Ex: Lait" required maxlength="80" />
          </label>

          <label>
            <span>Quantité</span>
            <input id="quantity" type="text" placeholder="Ex: 2" maxlength="30" />
          </label>

          <label>
            <span>Magasin</span>
            <select id="store">
              <option>Leclerc Theix</option>
              <option>Super U</option>
              <option>Intermarché</option>
              <option>Biocoop</option>
              <option>Autre</option>
            </select>
          </label>

          <button type="submit" class="btn btn-primary">Ajouter</button>
        </form>
      </section>

      <section class="card list-card" aria-label="Articles">
        <div class="list-toolbar">
          <h2>Ma liste</h2>
          <button id="clear-btn" class="btn btn-danger" type="button">Vider les achetés</button>
        </div>
        <p id="status" class="status">Chargement...</p>
        <ul id="list" class="shopping-list"></ul>
      </section>
    </main>

    <script src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
